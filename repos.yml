  acts-project/acts:
    language: cpp
    docker_image: ghcr.io/acts-project/ubuntu2404:latest
    build_cmd: >-
      cmake -B build -S . -DACTS_BUILD_UNITTESTS=ON -DCMAKE_BUILD_TYPE=Release
      && cmake --build build --parallel 4
    test_cmd: "ctest --test-dir build -R '.*' --output-on-failure"
    test_framework: catch2
    src_file_pattern: '\.(cpp|hpp|h|ipp|cuh|cu)$'
    test_file_pattern: '(Tests?/|tests?/|_[Tt]est\.|[Tt]est_|/[Tt]est[^/]*\.|UnitTest|IntegrationTest)'
